<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Monolithic Lattice - AI Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --lattice-color: rgba(255, 255, 255, 0.05);
            --accent-1: #00f2ff;
            --accent-2: #7000ff;
            --accent-3: #ff00c8;
            --text-main: #ffffff;
            --text-dim: #666666;
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Noise Texture Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.05;
            z-index: 999;
        }

        .container {
            display: flex;
            gap: 40px;
            perspective: 2000px;
            padding: 40px;
        }

        /* The Card Entity */
        .card {
            position: relative;
            width: 320px;
            height: 480px;
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s var(--transition);
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.1),
                0 30px 60px rgba(0,0,0,0.5);
        }

        /* Monolithic Edges */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #444, #111, #444);
            z-index: -1;
            border-radius: 10px;
        }

        /* Lattice Grid Pattern */
        .lattice {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--lattice-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--lattice-color) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        /* Holographic Overlay */
        .holo {
            position: absolute;
            inset: 0;
            z-index: 3;
            border-radius: 8px;
            opacity: 0;
            mix-blend-mode: color-dodge;
            transition: opacity 0.5s var(--transition);
            background: linear-gradient(
                105deg,
                transparent 30%,
                var(--accent-1) 45%,
                var(--accent-2) 50%,
                var(--accent-3) 55%,
                transparent 70%
            );
            background-size: 300% 300%;
            background-position: var(--px) var(--py);
        }

        .card:hover .holo {
            opacity: 0.4;
        }

        /* Visual Content Area */
        .visual-container {
            position: relative;
            height: 280px;
            margin: 15px;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ai-avatar {
            width: 140px;
            height: 140px;
            position: relative;
            filter: drop-shadow(0 0 20px var(--glow));
        }

        /* Geometric Abstract Shapes */
        .shape {
            position: absolute;
            inset: 0;
            border: 2px solid white;
            animation: rotate 10s linear infinite;
        }

        .shape-1 { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; border-color: var(--accent-1); }
        .shape-2 { border-radius: 50%; border-color: var(--accent-2); animation-direction: reverse; transform: scale(1.2); }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Typography & Info */
        .content {
            padding: 0 20px 20px 20px;
            position: relative;
            z-index: 4;
        }

        .model-class {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-1);
            margin-bottom: 4px;
            display: block;
        }

        .model-name {
            font-weight: 900;
            font-size: 28px;
            line-height: 1;
            text-transform: uppercase;
            font-style: italic;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
        }

        /* Rank Badge */
        .rank {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 5;
        }

        /* Scanned line effect */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            top: 0;
            z-index: 6;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        svg {
            position: absolute;
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>

    <svg>
        <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.1" />
                <feFuncG type="linear" slope="0.1" />
                <feFuncB type="linear" slope="0.1" />
            </feComponentTransfer>
        </filter>
    </svg>

    <div class="noise" style="filter: url(#grain);"></div>

    <div class="container">
        <!-- Card 1: The Reasoning Model -->
        <div class="card" data-tilt style="--glow: var(--accent-1)">
            <div class="holo"></div>
            <div class="lattice"></div>
            <div class="scanline"></div>
            <div class="rank">Ω</div>
            <div class="visual-container">
                <div class="ai-avatar">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                </div>
            </div>
            <div class="content">
                <span class="model-class">Deep Reasoning / LLM</span>
                <h2 class="model-name">ASTRAL-01</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Logic Cap.</span>
                        <span class="stat-value">99.8%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Ctx Window</span>
                        <span class="stat-value">2.0M</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Latency</span>
                        <span class="stat-value">14ms</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Parameters</span>
                        <span class="stat-value">TRILLION+</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card 2: The Creative Model -->
        <div class="card" data-tilt style="--glow: var(--accent-3)">
            <div class="holo"></div>
            <div class="lattice"></div>
            <div class="scanline"></div>
            <div class="rank">Σ</div>
            <div class="visual-container">
                <div class="ai-avatar">
                    <div class="shape shape-1" style="border-radius: 30% 70% 30% 70%;"></div>
                    <div class="shape shape-2" style="border-radius: 10% 90% 10% 90%; border-color: var(--accent-3);"></div>
                </div>
            </div>
            <div class="content">
                <span class="model-class">Multimodal / Creative</span>
                <h2 class="model-name">NEXUS-X</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Fluidity</span>
                        <span class="stat-value">94.2%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Ctx Window</span>
                        <span class="stat-value">128K</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Latency</span>
                        <span class="stat-value">42ms</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Veracity</span>
                        <span class="stat-value">HIGH</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card 3: The Efficiency Model -->
        <div class="card" data-tilt style="--glow: var(--accent-2)">
            <div class="holo"></div>
            <div class="lattice"></div>
            <div class="scanline"></div>
            <div class="rank">Φ</div>
            <div class="visual-container">
                <div class="ai-avatar">
                    <div class="shape shape-1" style="border-radius: 0%;"></div>
                    <div class="shape shape-2" style="border-radius: 0%; transform: rotate(45deg); border-color: var(--accent-2);"></div>
                </div>
            </div>
            <div class="content">
                <span class="model-class">Edge / Real-time</span>
                <h2 class="model-name">OMNI-MINI</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Throughput</span>
                        <span class="stat-value">450 t/s</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Ctx Window</span>
                        <span class="stat-value">32K</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Memory</span>
                        <span class="stat-value">4.2GB</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Stability</span>
                        <span class="stat-value">MAX</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;

                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                
                // Holo positioning
                const holo = card.querySelector('.holo');
                const percentX = (x / rect.width) * 100;
                const percentY = (y / rect.height) * 100;
                holo.style.setProperty('--px', `${percentX}%`);
                holo.style.setProperty('--py', `${percentY}%`);
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    </script>
</body>
</html>
