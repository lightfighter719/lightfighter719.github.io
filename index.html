<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightfighter719</title>

    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        text-align: center;
        padding: 3rem 1rem;
      }

      header h1 {
        font-size: 3rem;
        margin: 0 0 0.5rem;
      }

      header p {
        font-size: 1.25rem;
        opacity: 0.9;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        border-radius: 1rem;
        padding: 2rem;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .card h2 {
        margin-top: 0;
      }

      footer {
        text-align: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.2);
        font-size: 0.9rem;
      }

      a {
        color: #ffd700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>GitHub Pages</h1>
      <p><strong>lightfighter719</strong></p>
    </header>

    <main>
      <div class="card">
        <h2>About This Site</h2>
        <p>
          This site is hosted with
          <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
        </p>
        <p>Feel free to check out my repositories and projects!</p>
      </div>
    </main>

    <footer>
      &copy; <span id="year"></span> lightfighter719. ❤️ GitHub Pages.
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
